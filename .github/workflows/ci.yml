name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Format lint
        run: swift format lint --strict --recursive Sources Tests Package.swift
      - name: Unit tests
        run: swift test
      - name: Install current Tart CLI
        run: brew install cirruslabs/cli/tart
      - name: Verify Tart CLI compatibility
        run: make compat
      - name: Build universal release
        run: make build
      - name: Generate update manifest
        env:
          RELEASE_BASE_URL: https://example.invalid/releases/download/development
          RELEASE_NOTES_URL: https://example.invalid/releases/development
        run: make manifest verify-manifest
      - name: Verify release
        run: make verify
      - uses: actions/upload-artifact@v4
        with:
          name: TartR-development-release
          retention-days: 14
          path: |
            outputs/TartR-*-macos.zip
            outputs/TartR-*-macos.zip.sha256
            outputs/TartR-*-macos.dmg
            outputs/TartR-*-macos.dmg.sha256
            outputs/TartR-update.json
