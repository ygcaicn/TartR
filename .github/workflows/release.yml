name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  signed-release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag and version
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Resources/Info.plist)
          test "v$VERSION" = "$GITHUB_REF_NAME"

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/tartr-signing.keychain-db"
          echo -n "$CERTIFICATE_BASE64" | /usr/bin/base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

      - name: Test
        run: make check

      - name: Build signed universal app
        env:
          SIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: make build

      - name: Configure notarization
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool store-credentials TartR-notary \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD"

      - name: Notarize and staple
        env:
          NOTARY_PROFILE: TartR-notary
        run: make notarize

      - name: Package source and verify
        run: |
          Scripts/package-source.sh "$GITHUB_REF_NAME"
          make verify

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            outputs/TartR-*-macos.zip
            outputs/TartR-*-macos.zip.sha256
            outputs/TartR-*-source.zip
            outputs/TartR-*-source.zip.sha256

      - name: Remove temporary keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/tartr-signing.keychain-db" || true

